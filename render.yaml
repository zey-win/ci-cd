services:
  - type: web
    name: zeywin-connect
    runtime: node
    rootDir: google-play-connect
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BASE_URL
        value: https://zeywin-connect.onrender.com
      - key: GOOGLE_CLOUD_PROJECT_ID
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_OWNER
        value: zey-win
      - key: GITHUB_REPO
        value: ci-cd
      - key: GITHUB_SECRET_NAME
        value: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON
      - key: GITHUB_TOKEN
        sync: false
      - key: SERVICE_ACCOUNT_ID
        value: zeywin-play-publisher
      - key: SERVICE_ACCOUNT_DISPLAY_NAME
        value: ZeyWin Google Play Publisher
      - key: ALLOWED_GOOGLE_EMAILS
        sync: false
