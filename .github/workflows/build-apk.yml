name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Android package name for this APK
        required: true
        default: com.playsocialgames.plinko
      app_name:
        description: App display name
        required: true
        default: Plinko
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: true
        default: zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0
      version_name:
        description: APK version name
        required: true
        default: 1.0.6
      version_code:
        description: APK version code
        required: true
        default: "6"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Android keystore
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore/user.keystore"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Android-

      - name: Free disk space
        shell: bash
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android/sdk/ndk
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Build APK
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore/user.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          ANDROID_PACKAGE_NAME: ${{ inputs.package_name || 'com.playsocialgames.plinko' }}
          ANDROID_PRODUCT_NAME: ${{ inputs.app_name || 'Plinko' }}
          ANDROID_VERSION_NAME: ${{ inputs.version_name || '1.0.6' }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code || '6' }}
          ZEYWIN_API_KEY: ${{ inputs.zeywin_api_key || 'zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0' }}
          APK_OUTPUT_PATH: build/android/Plinko_${{ inputs.package_name || 'com.playsocialgames.plinko' }}_v${{ inputs.version_code || '6' }}.apk
        shell: bash
        run: |
          mkdir -p build/android
          docker run --rm \
            --workdir /github/workspace \
            --volume "$PWD:/github/workspace" \
            --volume "$RUNNER_TEMP/keystore:$RUNNER_TEMP/keystore" \
            --env UNITY_LICENSE \
            --env UNITY_EMAIL \
            --env UNITY_PASSWORD \
            --env ANDROID_KEYSTORE_PATH \
            --env ANDROID_KEYSTORE_PASS \
            --env ANDROID_KEYALIAS_NAME \
            --env ANDROID_KEYALIAS_PASS \
            --env ANDROID_PACKAGE_NAME \
            --env ANDROID_PRODUCT_NAME \
            --env ANDROID_VERSION_NAME \
            --env ANDROID_VERSION_CODE \
            --env ZEYWIN_API_KEY \
            --env APK_OUTPUT_PATH \
            unityci/editor:ubuntu-2022.3.62f2-android-3 \
            /bin/bash -lc '
              set -euo pipefail
              mkdir -p /root/.local/share/unity3d/Unity/licenses
              mkdir -p /root/.local/share/unity3d/Unity
              if [ -n "${UNITY_LICENSE:-}" ]; then
                if printf "%s" "$UNITY_LICENSE" | grep -q "EntitlementGroup"; then
                  printf "%s" "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/licenses/UnityEntitlementLicense.xml
                else
                  printf "%s" "$UNITY_LICENSE" > /root/.local/share/unity3d/Unity/Unity_lic.ulf
                fi
              fi
              LOGIN_ARGS=()
              if [ -n "${UNITY_EMAIL:-}" ] && [ -n "${UNITY_PASSWORD:-}" ]; then
                LOGIN_ARGS=(-username "$UNITY_EMAIL" -password "$UNITY_PASSWORD")
              fi
              /opt/unity/Editor/Unity \
                -batchmode \
                -nographics \
                -quit \
                "${LOGIN_ARGS[@]}" \
                -projectPath /github/workspace \
                -executeMethod BuildGithubActionsApk.BuildAndroid \
                -logFile /github/workspace/build/unity-build.log
            ' || {
              code=$?
              echo "Unity failed with exit code $code"
              echo "----- unity-build.log -----"
              cat build/unity-build.log || true
              exit "$code"
            }

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plinko_ZeyWin_v6_apk
          path: build/android/*.apk
          if-no-files-found: error
