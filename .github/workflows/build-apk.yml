name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Android package name for this APK
        required: true
        default: com.playsocialgames.plinko
      app_name:
        description: App display name
        required: true
        default: Plinko
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: true
        default: zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0
      version_name:
        description: APK version name
        required: true
        default: 1.0.6
      version_code:
        description: APK version code
        required: true
        default: "6"
      admob_android_app_id:
        description: AdMob Android app id
        required: false
        default: ca-app-pub-6988952582458184~2578339758
      admob_android_banner_id:
        description: AdMob Android banner unit id
        required: false
        default: ca-app-pub-6988952582458184/7966397807
      admob_android_interstitial_id:
        description: AdMob Android interstitial unit id
        required: false
        default: ca-app-pub-6988952582458184/6653316139
      admob_android_rewarded_id:
        description: AdMob Android rewarded unit id
        required: false
        default: ca-app-pub-6988952582458184/3302497559

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify GitHub hosted runner
        shell: bash
        run: |
          set -euo pipefail
          echo "runner_environment=${{ runner.environment }}"
          echo "runner_os=${{ runner.os }}"
          echo "runner_name=${{ runner.name }}"
          if [ "${{ runner.environment }}" != "github-hosted" ]; then
            echo "This workflow must run on a GitHub-hosted runner, not on a local self-hosted machine."
            exit 1
          fi

      - name: Restore Android keystore
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore/user.keystore"

      - name: Free disk space
        shell: bash
        run: |
          set -euxo pipefail
          echo "----- disk before cleanup -----"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          docker system prune -af || true
          echo "----- disk after cleanup -----"
          df -h

      - name: Build APK
        uses: game-ci/unity-builder@v4
        timeout-minutes: 105
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore/user.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          ANDROID_PACKAGE_NAME: ${{ inputs.package_name || 'com.playsocialgames.plinko' }}
          ANDROID_PRODUCT_NAME: ${{ inputs.app_name || 'Plinko' }}
          ANDROID_VERSION_NAME: ${{ inputs.version_name || '1.0.6' }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code || '6' }}
          ZEYWIN_API_KEY: ${{ inputs.zeywin_api_key || 'zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0' }}
          ADMOB_ANDROID_APP_ID: ${{ inputs.admob_android_app_id || 'ca-app-pub-6988952582458184~2578339758' }}
          ADMOB_ANDROID_BANNER_ID: ${{ inputs.admob_android_banner_id || 'ca-app-pub-6988952582458184/7966397807' }}
          ADMOB_ANDROID_INTERSTITIAL_ID: ${{ inputs.admob_android_interstitial_id || 'ca-app-pub-6988952582458184/6653316139' }}
          ADMOB_ANDROID_REWARDED_ID: ${{ inputs.admob_android_rewarded_id || 'ca-app-pub-6988952582458184/3302497559' }}
          APK_OUTPUT_PATH: build/android/Plinko_${{ inputs.package_name || 'com.playsocialgames.plinko' }}_v${{ inputs.version_code || '6' }}.apk
        with:
          unityVersion: 6000.0.71f1
          targetPlatform: Android
          buildMethod: BuildGithubActionsApk.BuildAndroid
          customParameters: -logFile -

      - name: Upload Unity build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-build-log
          path: build/unity-build.log
          if-no-files-found: ignore

      - name: Verify APK output
        shell: bash
        env:
          APK_OUTPUT_PATH: build/android/Plinko_${{ inputs.package_name || 'com.playsocialgames.plinko' }}_v${{ inputs.version_code || '6' }}.apk
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "$APK_OUTPUT_PATH")"

          if [ ! -f "$APK_OUTPUT_PATH" ]; then
            echo "APK was not created at expected path: $APK_OUTPUT_PATH"
            echo "Searching for APK files in workspace..."
            found_apk="$(find . -type f -name '*.apk' -print | head -n 1 || true)"
            if [ -n "$found_apk" ]; then
              echo "Found APK at $found_apk"
              cp "$found_apk" "$APK_OUTPUT_PATH"
            fi
          fi

          if [ ! -f "$APK_OUTPUT_PATH" ]; then
            echo "APK was not created and no fallback APK was found."
            echo "----- apk files -----"
            find . -type f -name '*.apk' -print || true
            echo "----- build files -----"
            find build Builds -maxdepth 5 -type f -print 2>/dev/null || true
            echo "----- important Unity log lines from console log -----"
            if [ -f build/unity-build.log ]; then
              grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android APK build failed" build/unity-build.log || true
            else
              echo "Unity log file was not written because Unity logs are streamed to the GitHub Actions console."
            fi
            exit 1
          fi

          ls -lh "$APK_OUTPUT_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plinko_ZeyWin_v6_apk
          path: build/android/*.apk
          if-no-files-found: error

      - name: Publish APK release and metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          apk_path="$(find build/android -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK found in build/android"
            exit 1
          fi

          mkdir -p builds
          apk_name="$(basename "$apk_path")"
          release_tag="apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$release_tag"

          shasum -a 256 "$apk_path" | sed "s#  .*#  $apk_name#" > "builds/$apk_name.sha256"
          gh release create "$release_tag" "$apk_path#$apk_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "APK $apk_name" \
            --notes "APK built by GitHub Actions run $GITHUB_RUN_NUMBER attempt $GITHUB_RUN_ATTEMPT."

          {
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "run_attempt=$GITHUB_RUN_ATTEMPT"
            echo "commit_sha=$GITHUB_SHA"
            echo "ref=$GITHUB_REF_NAME"
            echo "apk_artifact=Plinko_ZeyWin_v6_apk"
            echo "apk_release=$release_url"
            echo "apk_asset=$apk_name"
            echo "built_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > builds/latest-build.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "builds/$apk_name.sha256" builds/latest-build.txt

          if git diff --cached --quiet; then
            echo "APK metadata in repository is already up to date: builds/latest-build.txt"
            exit 0
          fi

          git commit -m "Record APK from GitHub Actions run $GITHUB_RUN_NUMBER"
          if ! git pull --rebase origin "$GITHUB_REF_NAME"; then
            echo "Metadata rebase failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi

          if ! git push origin "HEAD:$GITHUB_REF_NAME"; then
            echo "Metadata push failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi
