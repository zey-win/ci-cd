name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: Android package name for this APK
        required: true
        default: com.playsocialgames.plinko
      app_name:
        description: App display name
        required: true
        default: Plinko
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: true
        default: zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0
      version_name:
        description: APK version name
        required: true
        default: 1.0.6
      version_code:
        description: APK version code
        required: true
        default: "6"
      admob_android_app_id:
        description: AdMob Android app id
        required: false
        default: ca-app-pub-6988952582458184~2578339758
      admob_android_banner_id:
        description: AdMob Android banner unit id
        required: false
        default: ca-app-pub-6988952582458184/7966397807
      admob_android_interstitial_id:
        description: AdMob Android interstitial unit id
        required: false
        default: ca-app-pub-6988952582458184/6653316139
      admob_android_rewarded_id:
        description: AdMob Android rewarded unit id
        required: false
        default: ca-app-pub-6988952582458184/3302497559

jobs:
  build-apk:
    runs-on: self-hosted
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Android keystore
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/keystore/user.keystore"

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Packages/manifest.json', 'Packages/packages-lock.json', 'ProjectSettings/ProjectVersion.txt') }}
          restore-keys: |
            Library-Android-

      - name: Free disk space
        shell: bash
        run: |
          df -h

      - name: Build APK
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/keystore/user.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          ANDROID_PACKAGE_NAME: ${{ inputs.package_name || 'com.playsocialgames.plinko' }}
          ANDROID_PRODUCT_NAME: ${{ inputs.app_name || 'Plinko' }}
          ANDROID_VERSION_NAME: ${{ inputs.version_name || '1.0.6' }}
          ANDROID_VERSION_CODE: ${{ inputs.version_code || '6' }}
          ZEYWIN_API_KEY: ${{ inputs.zeywin_api_key || 'zw_b805cd36c981a96312521e8d84b20f5b54731a69914c31c0' }}
          ADMOB_ANDROID_APP_ID: ${{ inputs.admob_android_app_id || 'ca-app-pub-6988952582458184~2578339758' }}
          ADMOB_ANDROID_BANNER_ID: ${{ inputs.admob_android_banner_id || 'ca-app-pub-6988952582458184/7966397807' }}
          ADMOB_ANDROID_INTERSTITIAL_ID: ${{ inputs.admob_android_interstitial_id || 'ca-app-pub-6988952582458184/6653316139' }}
          ADMOB_ANDROID_REWARDED_ID: ${{ inputs.admob_android_rewarded_id || 'ca-app-pub-6988952582458184/3302497559' }}
          APK_OUTPUT_PATH: build/android/Plinko_${{ inputs.package_name || 'com.playsocialgames.plinko' }}_v${{ inputs.version_code || '6' }}.apk
        shell: bash
        run: |
          mkdir -p build/android
          UNITY="/Applications/Unity/Hub/Editor/6000.0.71f1/Unity.app/Contents/MacOS/Unity"
          "$UNITY" \
            -quit \
            -projectPath "$PWD" \
            -executeMethod BuildGithubActionsApk.BuildAndroid \
            -logFile "$PWD/build/unity-build.log" || {
              code=$?
              echo "Unity failed with exit code $code"
              echo "----- unity-build.log -----"
              cat build/unity-build.log || true
              exit "$code"
            }
          if [ ! -f "$APK_OUTPUT_PATH" ]; then
            echo "APK was not created at $APK_OUTPUT_PATH"
            echo "----- build files -----"
            find build -maxdepth 4 -type f -print || true
            echo "----- important Unity log lines -----"
            grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android APK build failed" build/unity-build.log || true
            exit 1
          fi
          ls -lh "$APK_OUTPUT_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Plinko_ZeyWin_v6_apk
          path: build/android/*.apk
          if-no-files-found: error
