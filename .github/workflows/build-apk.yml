name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      game_repository:
        description: Private game repository to checkout
        required: true
        default: zey-win/plinko
      game_ref:
        description: Game repository branch, tag, or commit
        required: true
        default: main
      package_name:
        description: Android package name for this APK
        required: true
        default: com.playsocialgames.plinko
      app_name:
        description: App display name
        required: true
        default: Plinko
      zeywin_api_key:
        description: ZeyWin API key for this package
        required: true
      version_mode:
        description: auto_next = easiest; manual = use the two version fields below
        required: true
        default: auto_next
        type: choice
        options:
          - auto_next
          - manual
      version_name:
        description: Manual only. Use 1.0.<next code>. See builds/index.md. Empty in auto_next.
        required: false
        default: ''
      version_code:
        description: Manual only. Must be previous code + 1 or higher. See builds/index.md.
        required: false
        default: ''
      admob_android_app_id:
        description: AdMob Android app id
        required: false
      admob_android_banner_id:
        description: AdMob Android banner unit id
        required: false
      admob_android_interstitial_id:
        description: AdMob Android interstitial unit id
        required: false
      admob_android_rewarded_id:
        description: AdMob Android rewarded unit id
        required: false

concurrency:
  group: apk-build-${{ github.ref }}-${{ inputs.package_name || 'unknown-package' }}
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs and secrets
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          APP_NAME: ${{ inputs.app_name }}
          VERSION_NAME: ${{ inputs.version_name }}
          VERSION_CODE: ${{ inputs.version_code }}
        run: |
          set -euo pipefail
          echo "::add-mask::${{ inputs.zeywin_api_key }}"
          echo "::add-mask::${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID }}"
          echo "::add-mask::${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID }}"
          echo "::add-mask::${{ inputs.admob_android_interstitial_id || secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}"
          echo "::add-mask::${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID }}"
          test -n "$PRIVATE_REPO_TOKEN" || { echo "Missing PRIVATE_REPO_TOKEN secret for private game/SDK checkout."; exit 1; }
          test -n "$PACKAGE_NAME" || { echo "package_name is required."; exit 1; }
          test -n "$APP_NAME" || { echo "app_name is required."; exit 1; }
          test -n "${{ inputs.zeywin_api_key }}" || { echo "zeywin_api_key is required."; exit 1; }

      - name: Checkout private game project
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.game_repository }}
          ref: ${{ inputs.game_ref }}
          path: game
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          persist-credentials: false
          fetch-depth: 0

      - name: Configure private SDK access
        shell: bash
        env:
          PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
        run: |
          set -euo pipefail
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "https://github.com/"
          git config --global url."https://x-access-token:${PRIVATE_REPO_TOKEN}@github.com/".insteadOf "git@github.com:"

      - name: Verify GitHub hosted runner
        shell: bash
        run: |
          set -euo pipefail
          echo "runner_environment=${{ runner.environment }}"
          echo "runner_os=${{ runner.os }}"
          echo "runner_name=${{ runner.name }}"
          if [ "${{ runner.environment }}" != "github-hosted" ]; then
            echo "This workflow must run on a GitHub-hosted runner, not on a local self-hosted machine."
            exit 1
          fi

      - name: Restore Android keystore
        shell: bash
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.ci/keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/.ci/keystore/user.keystore"
          test -s "$GITHUB_WORKSPACE/.ci/keystore/user.keystore" || { echo "Decoded Android keystore is empty."; exit 1; }

      - name: Resolve APK version
        id: resolve_version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION_MODE: ${{ inputs.version_mode }}
          VERSION_NAME_INPUT: ${{ inputs.version_name }}
          VERSION_CODE_INPUT: ${{ inputs.version_code }}
        run: |
          set -euo pipefail

          max_code=0
          latest_file="builds/$PACKAGE_NAME/latest-build.txt"
          if [ -f "$latest_file" ]; then
            code="$(sed -n 's/^version_code=//p' "$latest_file" | tail -n 1)"
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          fi

          while IFS= read -r dir; do
            code="${dir##*/v}"
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          done < <(find "builds/$PACKAGE_NAME" -maxdepth 1 -type d -name 'v[0-9]*' 2>/dev/null || true)

          while IFS= read -r code; do
            if [[ "$code" =~ ^[0-9]+$ ]] && [ "$code" -gt "$max_code" ]; then
              max_code="$code"
            fi
          done < <(gh release list --repo "$GITHUB_REPOSITORY" --limit 100 --json name --jq '.[].name' 2>/dev/null | sed -n "s/^APK $PACKAGE_NAME v\\([0-9][0-9]*\\)$/\\1/p" || true)

          if [ "$VERSION_MODE" = "manual" ]; then
            test -n "$VERSION_NAME_INPUT" || { echo "version_name is required when version_mode=manual. Example: 1.0.$((max_code + 1))"; exit 1; }
            test -n "$VERSION_CODE_INPUT" || { echo "version_code is required when version_mode=manual. Previous highest code is $max_code, so use $((max_code + 1)) or higher."; exit 1; }
          fi

          if [ "$VERSION_MODE" = "manual" ]; then
            version_code="$VERSION_CODE_INPUT"
          else
            version_code=$((max_code + 1))
          fi

          if ! [[ "$version_code" =~ ^[0-9]+$ ]]; then
            echo "version_code must be numeric, got: $version_code"
            exit 1
          fi

          if [ "$VERSION_MODE" = "manual" ] && [ "$version_code" -le "$max_code" ]; then
            echo "version_code must be greater than previous highest code $max_code. Use $((max_code + 1)) or higher."
            exit 1
          fi

          if [ "$VERSION_MODE" = "manual" ]; then
            version_name="$VERSION_NAME_INPUT"
          else
            version_name="1.0.$version_code"
          fi

          echo "version_code=$version_code" >> "$GITHUB_OUTPUT"
          echo "version_name=$version_name" >> "$GITHUB_OUTPUT"
          echo "apk_output_path=$GITHUB_WORKSPACE/build/android/APK_${PACKAGE_NAME}_v${version_code}.apk" >> "$GITHUB_OUTPUT"

          {
            echo "### Resolved APK version"
            echo "- Package: \`$PACKAGE_NAME\`"
            echo "- Mode: \`$VERSION_MODE\`"
            echo "- Previous highest version code: \`$max_code\`"
            echo "- Next manual version name/code: \`1.0.$((max_code + 1))\` / \`$((max_code + 1))\`"
            echo "- Version name: \`$version_name\`"
            echo "- Version code: \`$version_code\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Free disk space
        timeout-minutes: 8
        shell: bash
        run: |
          set -euxo pipefail
          echo "----- disk before cleanup -----"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/share/swift
          sudo rm -rf /opt/ghc
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true
          sudo apt-get clean
          echo "----- disk after cleanup -----"
          df -h

      - name: Build APK
        uses: game-ci/unity-builder@v4
        timeout-minutes: 105
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          GIT_PRIVATE_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          ANDROID_KEYSTORE_PATH: /github/workspace/.ci/keystore/user.keystore
          ANDROID_KEYSTORE_PASS: ${{ secrets.ANDROID_KEYSTORE_PASS }}
          ANDROID_KEYALIAS_NAME: ${{ secrets.ANDROID_KEYALIAS_NAME }}
          ANDROID_KEYALIAS_PASS: ${{ secrets.ANDROID_KEYALIAS_PASS }}
          ANDROID_PACKAGE_NAME: ${{ inputs.package_name }}
          ANDROID_PRODUCT_NAME: ${{ inputs.app_name }}
          ANDROID_VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
          ANDROID_VERSION_CODE: ${{ steps.resolve_version.outputs.version_code }}
          ZEYWIN_API_KEY: ${{ inputs.zeywin_api_key }}
          ADMOB_ANDROID_APP_ID: ${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID }}
          ADMOB_ANDROID_BANNER_ID: ${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID }}
          ADMOB_ANDROID_INTERSTITIAL_ID: ${{ inputs.admob_android_interstitial_id || secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}
          ADMOB_ANDROID_REWARDED_ID: ${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID }}
          APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
        with:
          unityVersion: 6000.0.71f1
          targetPlatform: Android
          projectPath: game
          versioning: None
          buildMethod: BuildGithubActionsApk.BuildAndroid
          customParameters: >-
            -logFile -
            -apkOutputPath "${{ steps.resolve_version.outputs.apk_output_path }}"
            -androidPackageName "${{ inputs.package_name }}"
            -androidProductName "${{ inputs.app_name }}"
            -androidVersionName "${{ steps.resolve_version.outputs.version_name }}"
            -androidVersionCode "${{ steps.resolve_version.outputs.version_code }}"
            -androidKeystorePath "/github/workspace/.ci/keystore/user.keystore"
            -zeywinApiKey "${{ inputs.zeywin_api_key }}"
            -admobAndroidAppId "${{ inputs.admob_android_app_id || secrets.ADMOB_ANDROID_APP_ID }}"
            -admobAndroidBannerId "${{ inputs.admob_android_banner_id || secrets.ADMOB_ANDROID_BANNER_ID }}"
            -admobAndroidInterstitialId "${{ inputs.admob_android_interstitial_id || secrets.ADMOB_ANDROID_INTERSTITIAL_ID }}"
            -admobAndroidRewardedId "${{ inputs.admob_android_rewarded_id || secrets.ADMOB_ANDROID_REWARDED_ID }}"

      - name: Upload Unity build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unity-build-log
          path: |
            build/unity-build.log
            game/build/unity-build.log
          if-no-files-found: ignore

      - name: Verify APK output
        shell: bash
        env:
          APK_OUTPUT_PATH: ${{ steps.resolve_version.outputs.apk_output_path }}
        run: |
          set -euo pipefail
          sudo chown -R "$USER:$USER" build Builds game/build game/Builds game/Library/Bee/Android 2>/dev/null || true
          mkdir -p "$(dirname "$APK_OUTPUT_PATH")"

          if [ ! -f "$APK_OUTPUT_PATH" ]; then
            echo "APK was not created at expected path: $APK_OUTPUT_PATH"
            echo "Searching for APK files in Unity output folders..."
            found_apk="$(find build/android Builds game/build game/Builds game/Library/Bee/Android -type f -name '*.apk' -print 2>/dev/null | head -n 1 || true)"
            if [ -n "$found_apk" ]; then
              echo "Found APK at $found_apk"
              cp "$found_apk" "$APK_OUTPUT_PATH"
            fi
          fi

          if [ ! -f "$APK_OUTPUT_PATH" ]; then
            echo "APK was not created and no fallback APK was found."
            echo "----- apk files -----"
            find . -type f -name '*.apk' -print || true
            echo "----- build files -----"
            find build Builds game/build game/Builds game/Library/Bee/Android -maxdepth 8 -type f -print 2>/dev/null || true
            echo "----- important Unity log lines from console log -----"
            if [ -f build/unity-build.log ]; then
              grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android APK build failed" build/unity-build.log || true
            elif [ -f game/build/unity-build.log ]; then
              grep -E "ZeyWinActions|Build result|error CS|Script Compilation Error|Exception|Android APK build failed" game/build/unity-build.log || true
            else
              echo "Unity log file was not written because Unity logs are streamed to the GitHub Actions console."
            fi
            exit 1
          fi

          ls -lh "$APK_OUTPUT_PATH"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: APK_${{ inputs.package_name }}_v${{ steps.resolve_version.outputs.version_code }}
          path: build/android/*.apk
          if-no-files-found: error

      - name: Publish APK release and metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_NAME: ${{ inputs.package_name }}
          VERSION_NAME: ${{ steps.resolve_version.outputs.version_name }}
          VERSION_CODE: ${{ steps.resolve_version.outputs.version_code }}
        run: |
          set -euo pipefail
          apk_path="$(find build/android -maxdepth 1 -type f -name '*.apk' | head -n 1)"
          if [ -z "$apk_path" ]; then
            echo "No APK found in build/android"
            exit 1
          fi

          version_dir="builds/$PACKAGE_NAME/v$VERSION_CODE"
          latest_dir="builds/$PACKAGE_NAME"
          mkdir -p "$version_dir" "$latest_dir"
          apk_name="$(basename "$apk_path")"
          release_tag="apk-${GITHUB_RUN_NUMBER}-${GITHUB_RUN_ATTEMPT}"
          release_url="https://github.com/$GITHUB_REPOSITORY/releases/tag/$release_tag"

          cp "$apk_path" "$version_dir/$apk_name"
          shasum -a 256 "$apk_path" | sed "s#  .*#  $apk_name#" > "$version_dir/$apk_name.sha256"
          gh release create "$release_tag" "$apk_path#$apk_name" \
            --repo "$GITHUB_REPOSITORY" \
            --title "APK $PACKAGE_NAME v$VERSION_CODE" \
            --notes "APK built by GitHub Actions run $GITHUB_RUN_NUMBER attempt $GITHUB_RUN_ATTEMPT."

          git fetch origin "$GITHUB_REF_NAME"
          git reset --hard "origin/$GITHUB_REF_NAME"
          mkdir -p "$version_dir" "$latest_dir"
          cp "$apk_path" "$version_dir/$apk_name"
          shasum -a 256 "$apk_path" | sed "s#  .*#  $apk_name#" > "$version_dir/$apk_name.sha256"

          {
            echo "run_id=$GITHUB_RUN_ID"
            echo "run_number=$GITHUB_RUN_NUMBER"
            echo "run_attempt=$GITHUB_RUN_ATTEMPT"
            echo "commit_sha=$GITHUB_SHA"
            echo "ref=$GITHUB_REF_NAME"
            echo "package_name=$PACKAGE_NAME"
            echo "version_name=$VERSION_NAME"
            echo "version_code=$VERSION_CODE"
            echo "apk_artifact=APK_${PACKAGE_NAME}_v${VERSION_CODE}"
            echo "apk_release=$release_url"
            echo "apk_asset=$apk_name"
            echo "apk_path=$version_dir/$apk_name"
            echo "built_at_utc=$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "run_url=https://github.com/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          } > "$version_dir/build.txt"
          cp "$version_dir/build.txt" "$latest_dir/latest-build.txt"

          {
            echo "# Latest APK Builds"
            echo
            echo "Use this table before manual workflow runs. For manual mode, set version_code to at least previous code + 1."
            echo
            echo "| Package | Latest version name | Latest version code | Next manual version name | Next manual version code | APK |"
            echo "| --- | --- | ---: | --- | ---: | --- |"
            while IFS= read -r latest_file; do
              pkg="$(sed -n 's/^package_name=//p' "$latest_file" | tail -n 1)"
              name="$(sed -n 's/^version_name=//p' "$latest_file" | tail -n 1)"
              code="$(sed -n 's/^version_code=//p' "$latest_file" | tail -n 1)"
              path="$(sed -n 's/^apk_path=//p' "$latest_file" | tail -n 1)"
              if [[ "$code" =~ ^[0-9]+$ ]]; then
                next_code=$((code + 1))
              else
                next_code=1
              fi
              echo "| \`$pkg\` | \`$name\` | \`$code\` | \`1.0.$next_code\` | \`$next_code\` | [$path]($path) |"
            done < <(find builds -mindepth 2 -maxdepth 2 -name latest-build.txt -type f | sort)
          } > builds/index.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f "$version_dir/$apk_name" "$version_dir/$apk_name.sha256" "$version_dir/build.txt" "$latest_dir/latest-build.txt" builds/index.md

          if git diff --cached --quiet; then
            echo "APK metadata in repository is already up to date: builds/latest-build.txt"
            exit 0
          fi

          git commit -m "Record APK from GitHub Actions run $GITHUB_RUN_NUMBER"
          if ! git pull --rebase --autostash origin "$GITHUB_REF_NAME"; then
            echo "Metadata rebase failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi

          if ! git push origin "HEAD:$GITHUB_REF_NAME"; then
            echo "Metadata push failed after APK release upload. APK is already available in the release: $release_url"
            exit 0
          fi
