name: Bootstrap Google Play Connect

on:
  workflow_dispatch:
    inputs:
      setup_mode:
        description: check_only prints exact admin requirements; apply writes Render env and redeploys
        required: true
        default: check_only
        type: choice
        options:
          - check_only
          - apply
          - redeploy_only
      google_cloud_project_id:
        description: Optional override. Default comes from repository secret GOOGLE_CLOUD_PROJECT_ID.
        required: false
      google_client_id:
        description: Optional override. Default comes from repository secret GOOGLE_CLIENT_ID.
        required: false
      google_client_secret:
        description: Optional override. Default comes from repository secret GOOGLE_CLIENT_SECRET.
        required: false
      render_service_id:
        description: Render service id for zeywin-connect
        required: true
        default: srv-d8948p3eo5us738g5dag

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate secrets
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ secrets.RENDER_API_KEY }}" || { echo "Missing RENDER_API_KEY secret."; exit 1; }
          test -n "${{ secrets.CONNECT_GITHUB_TOKEN }}" || { echo "Missing CONNECT_GITHUB_TOKEN secret."; exit 1; }

      - name: Check admin requirements
        if: ${{ inputs.setup_mode == 'check_only' }}
        shell: bash
        run: |
          {
            echo "### Google Play Connect admin requirements"
            echo
            echo "This check does not modify Render."
            echo
            echo "Create/select a Google Cloud project and OAuth Web Client once."
            echo
            echo "**OAuth redirect URI:**"
            echo
            echo "\`\`\`text"
            echo "https://zeywin-connect.onrender.com/oauth2callback"
            echo "\`\`\`"
            echo
            echo "Then rerun this workflow with:"
            echo
            echo "- \`setup_mode=apply\`"
            echo "- \`google_cloud_project_id\`"
            echo "- \`google_client_id\`"
            echo "- \`google_client_secret\`"
            echo
            echo "After success, marketers use only:"
            echo
            echo "https://zey-win.github.io/connect/"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stop after check
        if: ${{ inputs.setup_mode == 'check_only' }}
        shell: bash
        run: |
          echo "Check-only mode finished."

      - name: Bootstrap Render environment
        if: ${{ inputs.setup_mode == 'apply' }}
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.CONNECT_GITHUB_TOKEN }}
          GOOGLE_CLOUD_PROJECT_ID: ${{ inputs.google_cloud_project_id || secrets.GOOGLE_CLOUD_PROJECT_ID }}
          GOOGLE_CLIENT_ID: ${{ inputs.google_client_id || secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ inputs.google_client_secret || secrets.GOOGLE_CLIENT_SECRET }}
          RENDER_SERVICE_ID: ${{ inputs.render_service_id }}
        run: |
          set -euo pipefail
          test -n "$GOOGLE_CLOUD_PROJECT_ID" || { echo "google_cloud_project_id is required in apply mode."; exit 1; }
          test -n "$GOOGLE_CLIENT_ID" || { echo "google_client_id is required in apply mode."; exit 1; }
          test -n "$GOOGLE_CLIENT_SECRET" || { echo "google_client_secret is required in apply mode."; exit 1; }
          node google-play-connect/scripts/bootstrap-admin.mjs

      - name: Redeploy connect portal
        if: ${{ inputs.setup_mode == 'apply' || inputs.setup_mode == 'redeploy_only' }}
        shell: bash
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ inputs.render_service_id }}
        run: |
          set -euo pipefail
          deploy_json="$(curl -sS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"clear"}' || true)"
          if [ -n "$deploy_json" ]; then
            deploy_id="$(node -e 'const body=JSON.parse(process.argv[1]); console.log(body.id || body.deploy?.id || "")' "$deploy_json")"
          else
            deploy_id=""
          fi
          if [ -z "$deploy_id" ]; then
            sleep 3
            deploy_list_json="$(curl -sS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys?limit=1" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")"
            deploy_id="$(node -e 'const body=JSON.parse(process.argv[1]); const first=Array.isArray(body) ? body[0] : body.deploys?.[0]; console.log(first?.id || first?.deploy?.id || "")' "$deploy_list_json")"
          fi
          test -n "$deploy_id" || { echo "Render deploy response did not contain an id."; echo "$deploy_json"; exit 1; }
          echo "Render deploy: $deploy_id"

          for attempt in {1..60}; do
            status_json="$(curl -sS "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys/${deploy_id}" \
              -H "Authorization: Bearer ${RENDER_API_KEY}")"
            status="$(node -e 'const body=JSON.parse(process.argv[1]); console.log(body.status || body.deploy?.status || "")' "$status_json")"
            commit="$(node -e 'const body=JSON.parse(process.argv[1]); console.log(body.commit?.id || body.deploy?.commit?.id || "")' "$status_json")"
            echo "Render deploy status attempt $attempt: ${status:-unknown} ${commit:+commit=$commit}"
            case "$status" in
              live|succeeded|active)
                exit 0
                ;;
              build_failed|update_failed|canceled|deactivated)
                echo "$status_json"
                exit 1
                ;;
            esac
            sleep 10
          done

          echo "Render deploy did not become live in time."
          exit 1

      - name: Summary
        if: ${{ inputs.setup_mode == 'apply' || inputs.setup_mode == 'redeploy_only' }}
        shell: bash
        run: |
          {
            echo "### Google Play Connect bootstrap"
            echo
            echo "- Portal: https://zey-win.github.io/connect/"
            echo "- Backend: https://zeywin-connect.onrender.com/operator"
            echo "- Status: https://zeywin-connect.onrender.com/status"
          } >> "$GITHUB_STEP_SUMMARY"
